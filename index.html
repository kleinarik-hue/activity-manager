<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1a56db">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>מנהל פעילויות</title>

  <!-- ════ Bootstrap 5 RTL ════════════════════════════════ -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css"
        crossorigin="anonymous">

  <!-- ════ Custom Styles ══════════════════════════════════ -->
  <link rel="stylesheet" href="css/style.css">

  <!-- ════ Google Maps JS API ════════════════════════════
       Replace YOUR_GOOGLE_MAPS_API_KEY_HERE with your key.
       Or leave callback=initMapCallback to load lazily.   -->
  <script>
    // Load Google Maps only when the map page is shown.
    // This prevents slowing down initial app load.
    window.mapsLoaded = false;
    function loadGoogleMaps() {
      if (window.mapsLoaded) return Promise.resolve();
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        // Replace config value with your actual key
        const key = (typeof CONFIG !== "undefined") ? CONFIG.GOOGLE_MAPS_API_KEY : "";
        script.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=places&callback=_gmapsReady`;
        script.async = true;
        script.defer = true;
        window._gmapsReady = () => { window.mapsLoaded = true; resolve(); };
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }
  </script>
</head>

<body>
  <!--
    ╔══════════════════════════════════════════════════════╗
    ║  Activity Order Management System                    ║
    ║  The entire app UI is rendered by JavaScript.        ║
    ║  See js/app.js for the entry point.                  ║
    ╚══════════════════════════════════════════════════════╝
  -->

  <!-- Initial loading state (replaced by JS immediately) -->
  <div id="initialLoader" style="
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:#f8fafc;flex-direction:column;gap:1rem;z-index:9999;">
    <div style="
      width:48px;height:48px;
      border:4px solid #e8f0fe;
      border-top-color:#1a56db;
      border-radius:50%;
      animation:spin .8s linear infinite;">
    </div>
    <p style="font-family:Arial,sans-serif;color:#374151;font-weight:600;margin:0;">
      מנהל פעילויות
    </p>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>

  <!-- ════ Bootstrap JS ═══════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
          crossorigin="anonymous"></script>

  <!-- ════ Application Modules (load order matters!) ══════ -->
  <script src="js/config.js"></script>     <!-- 1. Config first -->
  <script src="js/api.js"></script>        <!-- 2. API layer -->
  <script src="js/auth.js"></script>       <!-- 3. Auth -->
  <script src="js/ui.js"></script>         <!-- 4. UI helpers -->
  <script src="js/dashboard.js"></script>  <!-- 5. Modules -->
  <script src="js/orders.js"></script>
  <script src="js/customers.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/mapview.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>        <!-- 6. App last -->

  <!-- Remove initial loader once scripts loaded -->
  <script>
    document.getElementById("initialLoader")?.remove();
  </script>
</body>
</html>
